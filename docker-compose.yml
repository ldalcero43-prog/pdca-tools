version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pdca_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pdca
      POSTGRES_PASSWORD: pdca123
      POSTGRES_DB: pdca_db
    volumes:
      - pdca_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdca -d pdca_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pdca_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - pdca_redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pdca_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pdca_access
      MINIO_ROOT_PASSWORD: pdca_secret_key_change_me
    volumes:
      - pdca_minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: pdca_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 pdca_access pdca_secret_key_change_me;
      mc mb --ignore-existing local/pdca-files;
      mc anonymous set none local/pdca-files;
      echo 'MinIO bucket initialized';
      "
    restart: on-failure

volumes:
  pdca_postgres_data:
  pdca_redis_data:
  pdca_minio_data:
